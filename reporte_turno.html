<!DOCTYPE html>
<html lang="es">
<head>

<script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@3.28.0/lib/msal-browser.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; color: #1a1a2e; }
  #loginScreen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #08235a 0%, #1a3a6b 60%, #0f5499 100%); }

  .login-logo { font-size: 48px; margin-bottom: 8px; }
  .login-title { font-size: 22px; font-weight: 700; color: white; margin-bottom: 4px; }
  .login-sub { font-size: 13px; color: rgba(255,255,255,0.65); margin-bottom: 28px; }
  .login-divider { height: 1px; background: rgba(255,255,255,0.2); margin: 20px 0; }
  .btn-ms { width: 100%; padding: 14px; border-radius: 10px; border: none; cursor: pointer; background: #2F6FD4; color: white; font-size: 15px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 12px; transition: opacity 0.2s; }
  .btn-ms:hover { opacity: 0.88; } .btn-ms:disabled { opacity: 0.5; cursor: not-allowed; }
  .ms-logo { display: flex; flex-direction: column; gap: 2px; } .ms-row { display: flex; gap: 2px; } .ms-sq { width: 10px; height: 10px; border-radius: 1px; }
  .login-error { background: rgba(220,38,38,0.2); border: 1px solid rgba(220,38,38,0.5); color: #fca5a5; border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-top: 16px; display: none; }
  .login-hint { font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 16px; }
  #appScreen { display: none; }
  .header { background: linear-gradient(90deg, #08235a, #1a3a6b); color: white; padding: 14px 32px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
  .header h1 { font-size: 18px; font-weight: 700; letter-spacing: 0.3px; }
  .header-sub { font-size: 12px; opacity: 0.65; margin-top: 2px; }

  .filtros label { font-size: 11px; color: #64748b; font-weight: 700; display: block; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  .filtros select, .filtros input { border: 1.5px solid #cbd5e1; border-radius: 6px; padding: 7px 11px; font-size: 13px; color: #1e293b; background: white; outline: none; transition: border-color 0.2s; }
  .filtros select:focus, .filtros input:focus { border-color: #1a3a6b; }

  .contenido { max-width: 980px; margin: 24px auto; padding: 0 24px 60px; }
  .resumen-cards { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 24px; }
  .card { background: white; border-radius: 10px; padding: 14px 16px; border-left: 4px solid; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .card.total { border-color: #1a3a6b; } .card.abierto { border-color: #3b82f6; } .card.en-curso { border-color: #f59e0b; } .card.cerrada { border-color: #22c55e; } .card.resuelta { border-color: #7c3aed; }
  .card-num { font-size: 30px; font-weight: 700; color: #1e293b; } .card-label { font-size: 11px; color: #64748b; margin-top: 2px; font-weight: 600; }
  .tarea-bloque { background: white; border-radius: 10px; margin-bottom: 16px; overflow: hidden; border: 1px solid #e2e8f0; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
  .tarea-header { padding: 14px 18px; display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; border-bottom: 1px solid #f1f5f9; background: #fafbff; }
  .tarea-titulo { font-size: 15px; font-weight: 700; color: #1e293b; }
  .tarea-meta { font-size: 12px; color: #64748b; margin-top: 3px; }
  .estado-badge { padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; white-space: nowrap; flex-shrink: 0; }
  .estado-Abierto { background: #dbeafe; color: #1e40af; } .estado-En-curso { background: #fef9c3; color: #854d0e; } .estado-Cerrada { background: #dcfce7; color: #166534; } .estado-Resuelta { background: #ede9fe; color: #5b21b6; }
  .tarea-body { padding: 14px 18px; }
  .tarea-info { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 14px; background: #f8fafc; border-radius: 8px; padding: 12px; }
  .info-item { font-size: 12px; } .info-label { color: #94a3b8; font-weight: 700; display: block; font-size: 10px; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 2px; } .info-value { color: #1e293b; font-weight: 500; }
  /* SECCIONES COLAPSABLES */
  .seccion-toggle { display: flex; align-items: center; justify-content: space-between; cursor: pointer; font-size: 11px; font-weight: 700; color: #1a3a6b; padding: 8px 10px; background: #eef2ff; border-radius: 6px; margin: 8px 0 0; border: 1px solid #c7d2fe; user-select: none; }
  .seccion-toggle:hover { background: #e0e7ff; }
  .seccion-toggle .toggle-icon { font-size: 14px; transition: transform 0.2s; }
  .seccion-toggle.open .toggle-icon { transform: rotate(180deg); }
  .seccion-contenido { overflow: hidden; transition: max-height 0.3s ease; }
  .seccion-contenido.collapsed { max-height: 0; }
  .seccion-contenido.expanded { max-height: 2000px; }
  .seccion-inner { padding-top: 8px; }
  /* INTERVENCIONES */
  .seccion-toggle-int { background: #eff6ff; border-color: #bfdbfe; color: #1e40af; }
  .seccion-toggle-int:hover { background: #dbeafe; }
  /* NOVEDADES FINALES */
  .seccion-novedades { max-width: 980px; margin: 0 auto; padding: 0 24px 24px; }
  .seccion-novedades-titulo { font-size: 18px; font-weight: 700; color: #991b1b; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 2px solid #dc2626; }
  .novedad-bloque { background: white; border-radius: 8px; margin-bottom: 10px; overflow: hidden; border: 1px solid #fecaca; border-left: 4px solid #dc2626; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
  .novedad-header { padding: 12px 16px; display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; border-bottom: 1px solid #fef2f2; background: #fff5f5; }
  .novedad-tipo { font-size: 13px; font-weight: 600; color: #991b1b; }
  .novedad-body { padding: 10px 16px; font-size: 12px; }
  .intervencion { background: #f8fafc; border-radius: 6px; padding: 10px 12px; margin-bottom: 6px; border-left: 3px solid #1a3a6b; }
  .intervencion-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .intervencion-hora { font-size: 11px; background: #e8f0fb; color: #1a3a6b; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
  .intervencion-desc { font-size: 13px; color: #1e293b; } .intervencion-meta { font-size: 11px; color: #94a3b8; margin-top: 4px; }
  .sin-datos { font-size: 12px; color: #94a3b8; font-style: italic; padding: 8px 0; }
  .checklist-bloque { background: #f8fafc; border-radius: 6px; padding: 10px 12px; margin-bottom: 6px; border-left: 3px solid #0f766e; }
  .checklist-modo { font-size: 11px; font-weight: 700; color: #0f766e; margin-bottom: 6px; }
  .checklist-items { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 4px; }
  .check-item { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
  .check-cumple { background: #dcfce7; color: #166534; } .check-nocumple { background: #fee2e2; color: #dc2626; }
  .check-km { font-size: 12px; color: #1e293b; font-weight: 600; }
  .control-tabla { width: 100%; border-collapse: collapse; font-size: 12px; margin-bottom: 4px; border-radius: 6px; overflow: hidden; }
  .control-tabla th { background: #1a3a6b; color: white; padding: 7px 10px; text-align: left; font-weight: 600; font-size: 11px; }
  .control-tabla td { padding: 6px 10px; border-bottom: 1px solid #f1f5f9; color: #1e293b; }
  .control-tabla tr:nth-child(even) td { background: #f8fafc; }
  .registro-lugar { background: #f0f7ff; border-radius: 6px; padding: 8px 12px; margin-bottom: 8px; border-left: 3px solid #3b82f6; }
  .registro-lugar-titulo { font-size: 12px; font-weight: 700; color: #1e40af; margin-bottom: 4px; }
  .loading { text-align: center; padding: 60px; color: #64748b; }
  .loading .spinner { width: 36px; height: 36px; border: 3px solid #e2e8f0; border-top-color: #1a3a6b; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty { text-align: center; padding: 60px; color: #94a3b8; } .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .reporte-titulo { font-size: 18px; font-weight: 700; color: #1a3a6b; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 2px solid #1a3a6b; display: none; }
  @media print {
    body { background: white; } #loginScreen { display: none !important; }
    .header { background: #1a3a6b !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .filtros { display: none; } .btn-print { display: none !important; } .btn-logout { display: none !important; }
    .reporte-titulo { display: block !important; } .tarea-bloque { break-inside: avoid; }
    .seccion-contenido.collapsed { max-height: 2000px !important; }
  }
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">📋</div>
    <div class="login-title">Seguridad Patrimonial</div>
    <div class="login-sub">Reporte de Turno — AUBASA</div>
    <div class="login-divider"></div>
    <button class="btn-ms" id="btnLogin" onclick="loginMicrosoft()">
      <div class="ms-logo">
        <div class="ms-row"><div class="ms-sq" style="background:#F25022"></div><div class="ms-sq" style="background:#7FBA00"></div></div>
        <div class="ms-row"><div class="ms-sq" style="background:#00A4EF"></div><div class="ms-sq" style="background:#FFB900"></div></div>
      </div>
      Ingresar con cuenta Microsoft
    </button>
    <div class="login-error" id="loginError"></div>
    <div class="login-hint">Solo personal de Seguridad Patrimonial</div>
    <div style="text-align:center;margin-top:16px;">
      <a href="#" onclick="loginAdmin()" style="color:rgba(255,255,255,0.5);font-size:12px;text-decoration:underline;">Acceso administrador</a>
    </div>
  </div>
</div>

<div id="appScreen">
  <div class="header">
    <div>
      <h1>📋 Reporte de Turno</h1>
      <div class="header-sub">Seguridad Patrimonial — AUBASA</div>
    </div>
    <div class="header-right">
      <span class="user-info" id="userInfo"></span>
      <button class="btn btn-print" id="btnImprimir" onclick="window.print()">🖨 Imprimir / PDF</button>
      <button class="btn-logout" onclick="logout()">Salir</button>
    </div>
  </div>
  <div class="filtros">
    <div><label>Turno</label>
      <select id="selTurno"><option value="Todos">Todos los turnos</option><option value="Mañana">Mañana</option><option value="Tarde">Tarde</option><option value="Noche">Noche</option></select>
    </div>
    <div><label>Desde</label><input type="date" id="selFechaDesde"></div>
    <div><label>Hasta</label><input type="date" id="selFechaHasta"></div>
    <div><label>Estado</label>
      <select id="selEstado"><option value="Todos">Todos los estados</option><option value="Abierto">Abierto</option><option value="En curso">En curso</option><option value="Cerrada">Cerrada</option><option value="Resuelta">Resuelta</option></select>
    </div>
    <button class="btn btn-primary" onclick="generarReporte()">🔍 Generar reporte</button>
  </div>
  <div class="contenido" id="contenido">
    <div class="empty"><div class="empty-icon">📋</div><div>Seleccioná turno y fecha para generar el reporte</div></div>
  </div>
</div>

<script>
var GET_EMPLEADOS_URL = 'https://default9444ead097714ed8a608802faff70d.4f.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/54a1c9328080444e8a9c76c509118e60/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=9aQMa6iAlNu7cjaLQjUEUS3IvVOg6E1MJtKtaqpOpEo';
var FLOW_URL = 'https://default9444ead097714ed8a608802faff70d.4f.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/b89902a8cdc84fd2b6c2fcc50d8b7818/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=LumCf2OdFu-BTnkPwlQ6DJIgxz7XxQXQByKvvmZ0jyQ';
var GET_CHECKLIST_URL = 'https://default9444ead097714ed8a608802faff70d.4f.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/bf78f54bef08499eb5dc49bff2dc10eb/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=PhE5cBP9ZnY5ai0x2jgOqMrYYRerHjzIluTJQo4F4s4';
var GET_VIGILANCIA_URL = 'https://default9444ead097714ed8a608802faff70d.4f.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/fb668c40a0d94daca6a8dae8ba5b809d/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=s3Jn0dtGjeq2p_aRQkgjary2HJxkN8I1W_qrsj2fhWk';
var usuarioActual = null;
var msalInstance = null;

const msalConfig = { auth: { clientId: '006c6fd8-c5f2-4b90-b047-d0b57f0bafcb', authority: 'https://login.microsoftonline.com/9444ead0-9771-4ed8-a608-802faff70d4f', redirectUri: window.location.href.split('?')[0] }, cache: { cacheLocation: 'sessionStorage' } };
try { msalInstance = new msal.PublicClientApplication(msalConfig); } catch(e) { console.warn('MSAL no disponible:', e.message); }

function loginAdmin() {
  var user = prompt('Usuario:'); if (!user) return;
  var pass = prompt('Contraseña:'); if (pass === null) return;
  if (user.trim() === 'admin' && pass === 'SegPatr2026') {
    usuarioActual = { nombre: 'Administrador' };
    document.getElementById('userInfo').textContent = '👤 Administrador';
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('appScreen').style.display = 'block';
    var hoy = new Date().toISOString().split('T')[0];
    document.getElementById('selFechaDesde').value = hoy;
    document.getElementById('selFechaHasta').value = hoy;
  } else {
    var el = document.getElementById('loginError'); el.textContent = 'Usuario o contraseña incorrectos.'; el.style.display = 'block';
  }
}

window.addEventListener('load', async () => {
  if (!msalInstance) return;
  try {
    await msalInstance.initialize();
    const accounts = msalInstance.getAllAccounts();
    if (accounts.length > 0) { await verificarYMostrarApp(accounts[0]); }
  } catch(e) { console.warn('MSAL init error:', e.message); }
});

async function loginMicrosoft() {
  const btn = document.getElementById('btnLogin'); btn.disabled = true; mostrarError('');
  try { const response = await msalInstance.loginPopup({ scopes: ['User.Read'] }); await verificarYMostrarApp(response.account); }
  catch (e) { btn.disabled = false; mostrarError('Error al iniciar sesión.'); }
}

async function verificarYMostrarApp(account) {
  mostrarError('');
  try {
    const email = account.username || '';
    const resp = await fetch(GET_EMPLEADOS_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({}) });
    const data = await resp.json();
    const empleados = Array.isArray(data) ? data : (data?.value || []);
    const empleado = empleados.find(e => (e.email || e.Email || '').toLowerCase() === email.toLowerCase());
    if (!empleado) { mostrarError('Tu cuenta no tiene acceso. Contactá al administrador.'); return; }
    if ((empleado.Activo?.Value || empleado.Activo) === 'No') { mostrarError('Tu cuenta está inactiva.'); return; }
    usuarioActual = { email, nombre: account.name || email };
    document.getElementById('userInfo').textContent = '👤 ' + usuarioActual.nombre;
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('appScreen').style.display = 'block';
    var hoy = new Date().toISOString().split('T')[0];
    document.getElementById('selFechaDesde').value = hoy;
    document.getElementById('selFechaHasta').value = hoy;
  } catch(e) { mostrarError('Error al verificar acceso: ' + e.message); }
}

function mostrarError(msg) { const el = document.getElementById('loginError'); el.textContent = msg; el.style.display = msg ? 'block' : 'none'; }
function logout() { usuarioActual = null; if (msalInstance) { try { msalInstance.logoutPopup(); } catch(e) {} } document.getElementById('loginScreen').style.display = 'flex'; document.getElementById('appScreen').style.display = 'none'; }

function getEstadoClass(e) { return 'estado-' + (e || 'Abierto').replace(' ', '-'); }
function formatFecha(f) { if (!f) return '—'; try { const p = f.split('T')[0]; if (p && p.length===10) { const [y,m,d]=p.split('-'); return d+'/'+m+'/'+y; } return new Date(f).toLocaleDateString('es-AR'); } catch(e) { return f; } }
function formatHora(h) { if (!h) return '—'; return h.length > 5 ? h.substring(0,5) : h; }
function val(c) { if (!c) return '—'; if (typeof c === 'object' && c.Value) return c.Value; return c; }

function toggleSeccion(id) {
  const contenido = document.getElementById(id);
  const toggle = document.querySelector('[data-target="'+id+'"]');
  if (!contenido) return;
  if (contenido.classList.contains('collapsed')) {
    contenido.classList.remove('collapsed'); contenido.classList.add('expanded');
    if (toggle) toggle.classList.add('open');
  } else {
    contenido.classList.remove('expanded'); contenido.classList.add('collapsed');
    if (toggle) toggle.classList.remove('open');
  }
}

async function fetchChecklist(idAsignacion) {
  try {
    const resp = await fetch(GET_CHECKLIST_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ IDAsignacion: Number(idAsignacion) }) });
    if (!resp.ok) return [];
    const data = await resp.json();
    return Array.isArray(data) ? data : (data?.value || []);
  } catch { return []; }
}

function renderChecklist(registros) {
  if (!registros || registros.length === 0) return '<div class="sin-datos">Sin checklist registrado</div>';
  const valChoice = c => c?.Value || c || null;
  return registros.map(r => {
    const modo = valChoice(r.Modo) || '';
    const esPre = modo.toLowerCase() === 'pre-inicio';
    const km = esPre ? r.Kminicial : r.KmFinal;
    const color = esPre ? '#0f766e' : '#1a3a6b';
    const titulo = esPre ? '✅ Check Pre-Inicio' : '🔒 Check de Cierre';
    const checks = ['Frenos','Luces','Agua','Aceite'].map(k => { const v = valChoice(r[k]); if (!v) return ''; return '<span class="check-item '+(v==='Cumple'?'check-cumple':'check-nocumple')+'">'+k+': '+v+'</span>'; }).filter(Boolean).join('');
    return '<div class="checklist-bloque" style="border-left-color:'+color+'"><div class="checklist-modo">'+titulo+'</div>'+(km!=null?'<div class="check-km" style="margin-bottom:6px">'+(esPre?'Km inicial':'Km final')+': '+km+' km</div>':'')+(checks?'<div class="checklist-items">'+checks+'</div>':'')+(r.Observacion?'<div style="font-size:11px;color:#64748b;margin-top:4px">Obs: '+r.Observacion+'</div>':'')+(r.ObservacionFinal?'<div style="font-size:11px;color:#64748b;margin-top:4px">Obs. final: '+r.ObservacionFinal+'</div>':'')+'<div style="font-size:10px;color:#94a3b8;margin-top:4px">'+(r.FechaInicio||'')+' '+(r.HoraInicio?r.HoraInicio+' hs':'')+(r.CargadoPorNombre?' · '+r.CargadoPorNombre:'')+'</div></div>';
  }).join('');
}

async function fetchVigilancia(idAsignacion) {
  try {
    const resp = await fetch(GET_VIGILANCIA_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ idAsignacion: Number(idAsignacion) }) });
    if (!resp.ok) return { registros: [], puestos: [] };
    const data = await resp.json();
    return { registros: data.registros || [], puestos: data.puestos || [] };
  } catch { return { registros: [], puestos: [] }; }
}

function renderVigilancia(data) {
  const registros = (data && data.registros) ? data.registros : [];
  const puestos = (data && data.puestos) ? data.puestos : [];
  if (registros.length === 0) return '<div class="sin-datos">Sin registros de vigilancia privada</div>';
  return registros.map(function(r) {
    var lugar = (r.Lugar && r.Lugar.Value) ? r.Lugar.Value : (r.Lugar || '—');
    var fotoUrl = r.FotosCarpetaURL || '';
    var idReg = r.ID;
    var puestosReg = puestos.filter(function(p) { return String(p.IDRegistro) === String(idReg); });
    var puestosHtml = '';
    if (puestosReg.length > 0) {
      puestosHtml = '<table class="control-tabla" style="margin-top:6px;"><thead><tr><th>Empresa</th><th>Cantidad</th><th>Horario</th><th>Observacion</th><th>Ubicación</th></tr></thead><tbody>'+
        puestosReg.map(function(p){ return '<tr><td>'+(p.Dependencia||'—')+'</td><td>'+(p.Cantidad||'—')+'</td><td>'+(p.Horario||'—')+'</td><td>'+(p.Observacion||'—')+'</td><td>'+(p.GPS_Latitud?'<a href="https://www.google.com/maps?q='+parseFloat(p.GPS_Latitud)+','+parseFloat(p.GPS_Longitud)+'" target="_blank" style="color:#3b82f6;text-decoration:none;">📍 Ver</a>':'—')+'</td></tr>'; }).join('')+
        '</tbody></table>';
    }
    return '<div class="registro-lugar" style="border-left-color:#7c3aed;">'+
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">'+
      '<div class="registro-lugar-titulo" style="color:#5b21b6;">🔒 '+lugar+'</div>'+
      (fotoUrl?'<a href="'+fotoUrl+'" target="_blank" style="font-size:11px;color:#5b21b6;font-weight:600;">📷 Ver fotos</a>':'')+
      '</div>'+
      (r.Observacion?'<div style="font-size:11px;color:#374151;margin-bottom:4px;">'+r.Observacion+'</div>':'')+
      puestosHtml+'</div>';
  }).join('');
}

async function generarReporte() {
  const turno = document.getElementById('selTurno').value;
  const estado = document.getElementById('selEstado').value;
  const fechaDesde = document.getElementById('selFechaDesde').value;
  const fechaHasta = document.getElementById('selFechaHasta').value;
  const contenido = document.getElementById('contenido');
  if (!fechaDesde || !fechaHasta) { alert('Seleccioná un rango de fechas'); return; }
  contenido.innerHTML = '<div class="loading"><div class="spinner"></div><div>Cargando reporte...</div></div>';
  document.getElementById('btnImprimir').style.display = 'none';
  try {
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 120000);
    const resp = await fetch(FLOW_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ turno, fechaDesde, fechaHasta }), signal: controller.signal });
    clearTimeout(timeoutId);
    if (!resp.ok) throw new Error('Error ' + resp.status);
    const data = await resp.json();
    const novedades = Array.isArray(data.eventualidades) ? data.eventualidades : (Array.isArray(data.novedades) ? data.novedades : []);
    let tareas = Array.isArray(data.tareas) ? data.tareas : (Array.isArray(data) ? data : (data.value || []));

    if (turno !== 'Todos') tareas = tareas.filter(item => { const t = item.tarea||item; return (t.Turno?.Value||t.Turno||'') === turno; });
    if (estado !== 'Todos') tareas = tareas.filter(item => { const t = item.tarea||item; return (t.Estado?.Value||t.Estado||'') === estado; });

    if (tareas.length === 0) { contenido.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><div>No hay tareas para el período seleccionado</div></div>'; return; }

    const contadores = { total: tareas.length, Abierto: 0, 'En curso': 0, Cerrada: 0, Resuelta: 0 };
    tareas.forEach(t => { const e = val(t.tarea?.Estado||t.Estado); if (contadores[e]!==undefined) contadores[e]++; });

    const checklistMap = {};
    try { await Promise.allSettled(tareas.map(async item => { const t=item.tarea||item; const id=t.ID||t.id; if(id){try{checklistMap[id]=await fetchChecklist(id);}catch(e){checklistMap[id]=[];}} })); } catch(e) {}

    let html = '<div class="reporte-titulo">Reporte — '+fechaDesde+' al '+fechaHasta+'</div>';
    html += '<div class="resumen-cards"><div class="card total"><div class="card-num">'+contadores.total+'</div><div class="card-label">Total</div></div><div class="card abierto"><div class="card-num">'+contadores['Abierto']+'</div><div class="card-label">Abiertas</div></div><div class="card en-curso"><div class="card-num">'+contadores['En curso']+'</div><div class="card-label">En curso</div></div><div class="card cerrada"><div class="card-num">'+contadores['Cerrada']+'</div><div class="card-label">Cerradas</div></div><div class="card resuelta"><div class="card-num">'+contadores['Resuelta']+'</div><div class="card-label">Resueltas</div></div></div>';

    var seccionIdx = 0;
    tareas.forEach(item => {
      const t = item.tarea || item;
      const id = t.ID || t.id;
      const intervenciones = item.intervenciones || [];
      const controlPolicial = item.control_policial || [];
      const registrosPolicial = item.registros_policial || [];
      const vigilanciaData = { registros: item.registros_vigilancia || [], puestos: item.control_vigilancia || [] };
      const checklists = checklistMap[id] || [];
      const estadoVal = val(t.Estado);
      const getV = v => v?.Value||v||'';
      const ops = [getV(t.Chofer1),getV(t.CHOFER2||t.chofer2),getV(t.Chofer3),getV(t.Administrativo1),getV(t.Administrativo2),getV(t.Administrativo3)].filter(Boolean);
      const operarios = ops.length > 0 ? ops.map(o=>'<span style="background:#e8f0fb;color:#1a3a6b;border-radius:12px;padding:2px 8px;font-size:11px;font-weight:600;margin:1px;display:inline-block;">👤 '+o+'</span>').join(' ') : '<span style="color:#94a3b8">Sin asignar</span>';

      // Fechas — nombres reales de SP
      const fechaInicio = t.Fechadeiniciodetarea || t.Fecha_de_inicio_de_tarea || '';
      const horaInicio = t.Horadeiniciodetarea || t.Hora_de_inicio_de_tarea || '';
      const fechaCierre = t.Fechadefindetarea || t.Fecha_de_fin_de_tarea || '';
      const horaCierre = t.Horadefindetareas || t.Hora_de_fin_de_tareas || '';

      const descReal = t.Descripcion_de_tarea_realizada || '';
      const obs = t.Observacion_cierre || '';

      const idxCh = seccionIdx+'ch'; const idxIv = seccionIdx+'iv'; const idxCp = seccionIdx+'cp'; const idxVg = seccionIdx+'vg';

      // Intervenciones HTML
      const intervsHtml = intervenciones.length === 0 ? '<div class="sin-datos">Sin intervenciones registradas</div>' :
        intervenciones.map(iv => {
          let meta = [];
          if (iv.GPS_Latitud) meta.push('📍 <a href="https://www.google.com/maps?q='+parseFloat(iv.GPS_Latitud)+','+parseFloat(iv.GPS_Longitud)+'" target="_blank" style="color:#3b82f6;text-decoration:none;">'+parseFloat(iv.GPS_Latitud).toFixed(4)+', '+parseFloat(iv.GPS_Longitud).toFixed(4)+'</a>');
          if (iv.CargadoPorNombre) meta.push('👤 '+iv.CargadoPorNombre);
          if (iv.FotosCarpetaURL) meta.push('<a href="'+iv.FotosCarpetaURL+'" target="_blank" style="color:#1a3a6b;">📷 Ver fotos</a>');
          return '<div class="intervencion"><div class="intervencion-header"><span class="intervencion-hora">'+formatFecha(iv.Fecha_Intervencion)+' '+formatHora(iv.Hora_Intervencion)+' hs</span></div><div class="intervencion-desc">'+(iv.Descripcion||'')+'</div>'+(meta.length?'<div class="intervencion-meta">'+meta.join(' &nbsp;·&nbsp; ')+'</div>':'')+'</div>';
        }).join('');

      // Control policial HTML — agrupado por lugar (registro)
      var cpHtml = '';
      if (registrosPolicial.length === 0 && controlPolicial.length === 0) {
        cpHtml = '<div class="sin-datos">Sin registros de control policial</div>';
      } else if (registrosPolicial.length > 0) {
        // Agrupar puestos por IDRegistro
        cpHtml = registrosPolicial.map(r => {
          const lugar = r.Lugar?.Value || r.Lugar || '—';
          const fotoUrl = r.FotosCarpetaURL || '';
          const idReg = r.ID;
          const puestos = controlPolicial.filter(cp => cp.IDRegistro == idReg);
          let puestosHtml = '';
          if (puestos.length > 0) {
            puestosHtml = '<table class="control-tabla" style="margin-top:6px;"><thead><tr><th>Puesto</th><th>Efectivos</th><th>Horario</th><th>Observación</th><th>Ubicación</th></tr></thead><tbody>'+
              puestos.map(cp=>'<tr><td>'+(cp.Dependencia||'—')+'</td><td>'+(cp.Cantidad||'—')+'</td><td>'+(cp.Horario||'—')+'</td><td>'+(cp.Observacion||'—')+'</td><td>'+(cp.GPS_Latitud?'<a href="https://www.google.com/maps?q='+parseFloat(cp.GPS_Latitud)+','+parseFloat(cp.GPS_Longitud)+'" target="_blank" style="color:#3b82f6;text-decoration:none;">📍 Ver</a>':'—')+'</td></tr>').join('')+
              '</tbody></table>';
          }
          return '<div class="registro-lugar">'+
            '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">'+
            '<div class="registro-lugar-titulo">📍 '+lugar+'</div>'+
            (fotoUrl?'<a href="'+fotoUrl+'" target="_blank" style="font-size:11px;color:#1a3a6b;font-weight:600;">📷 Ver fotos</a>':'')+
            '</div>'+
            (r.Observacion?'<div style="font-size:11px;color:#374151;margin-bottom:4px;">'+r.Observacion+'</div>':'')+
            puestosHtml+
            '</div>';
        }).join('');
      } else {
        // Sin registros pero hay puestos — mostrar tabla plana
        cpHtml = '<table class="control-tabla"><thead><tr><th>Dependencia</th><th>Efectivos</th><th>Horario</th><th>Observación</th></tr></thead><tbody>'+
          controlPolicial.map(cp=>'<tr><td>'+(cp.Dependencia||'—')+'</td><td>'+(cp.Cantidad||'—')+'</td><td>'+(cp.Horario||'—')+'</td><td>'+(cp.Observacion||'—')+'</td></tr>').join('')+
          '</tbody></table>';
      }

      html += '<div class="tarea-bloque">'+
        '<div class="tarea-header"><div>'+
        '<div class="tarea-titulo">'+(t.Title||t.titulo||'Sin título')+'</div>'+
        '<div class="tarea-meta" style="margin-top:4px;">ID #'+id+' · '+val(t.Turno)+' · '+(val(t['Concesi_x00f3_n'])||'—')+'</div>'+
        '<div style="margin-top:4px;">'+operarios+'</div>'+
        '</div><span class="estado-badge '+getEstadoClass(estadoVal)+'">'+estadoVal+'</span></div>'+
        '<div class="tarea-body">'+
        '<div class="tarea-info">'+
        '<div class="info-item"><span class="info-label">Tipo</span><span class="info-value">'+val(t.Tipo_de_tarea)+'</span></div>'+
        '<div class="info-item"><span class="info-label">Prioridad</span><span class="info-value">'+val(t.Prioridad)+'</span></div>'+
        '<div class="info-item"><span class="info-label">Dominio</span><span class="info-value">'+(t.Dominio||'—')+'</span></div>'+
        '<div class="info-item"><span class="info-label">Inicio</span><span class="info-value">'+(fechaInicio?formatFecha(fechaInicio)+' '+formatHora(horaInicio):'—')+'</span></div>'+
        '<div class="info-item"><span class="info-label">Cierre</span><span class="info-value">'+(fechaCierre?formatFecha(fechaCierre)+' '+formatHora(horaCierre):'—')+'</span></div>'+
        '<div class="info-item"><span class="info-label">Intervenciones</span><span class="info-value">'+intervenciones.length+'</span></div>'+
        '</div>'+
        (descReal?'<div style="font-size:12px;margin-bottom:10px;padding:10px;background:#f8fafc;border-radius:6px;border-left:3px solid #94a3b8;"><span style="color:#94a3b8;font-weight:700;display:block;margin-bottom:3px;font-size:10px;text-transform:uppercase;">Descripción realizada</span>'+descReal+'</div>':'')+
        (obs?'<div style="font-size:12px;margin-bottom:10px;padding:10px;background:#ede9fe;border-radius:6px;border-left:3px solid #7c3aed;"><span style="color:#5b21b6;font-weight:700;display:block;margin-bottom:3px;font-size:10px;text-transform:uppercase;">Observación de cierre</span>'+obs+'</div>':'')+
        // CHECKLIST colapsable
        '<div class="seccion-toggle" data-target="sec'+idxCh+'" onclick="toggleSeccion(\'sec'+idxCh+'\')">'+
        '<span>✅ CHECKLIST VEHÍCULO ('+checklists.length+')</span><span class="toggle-icon">▼</span></div>'+
        '<div id="sec'+idxCh+'" class="seccion-contenido collapsed"><div class="seccion-inner">'+renderChecklist(checklists)+'</div></div>'+
        // INTERVENCIONES colapsable
        '<div class="seccion-toggle seccion-toggle-int" data-target="sec'+idxIv+'" onclick="toggleSeccion(\'sec'+idxIv+'\')">'+
        '<span>📋 INTERVENCIONES / NOVEDADES ('+intervenciones.length+')</span><span class="toggle-icon">▼</span></div>'+
        '<div id="sec'+idxIv+'" class="seccion-contenido '+(intervenciones.length>0?'expanded':'collapsed')+'">'+
        (intervenciones.length>0?'<div class="seccion-toggle seccion-toggle-int open" data-target="sec'+idxIv+'" onclick="toggleSeccion(\'sec'+idxIv+'\')"><span>📋 INTERVENCIONES / NOVEDADES ('+intervenciones.length+')</span><span class="toggle-icon">▼</span></div>':'')+ // fix doble toggle — lo corrijo abajo
        '<div class="seccion-inner">'+intervsHtml+'</div></div>'+
        // CONTROL POLICIAL colapsable
        '<div class="seccion-toggle" style="background:#f0fdf4;border-color:#bbf7d0;color:#166534;" data-target="sec'+idxCp+'" onclick="toggleSeccion(\'sec'+idxCp+'\')">'+
        '<span>🚔 CONTROL POLICIAL ('+controlPolicial.length+' puestos)</span><span class="toggle-icon">▼</span></div>'+
        '<div id="sec'+idxCp+'" class="seccion-contenido collapsed"><div class="seccion-inner">'+cpHtml+'</div></div>'+
        '<div class="seccion-toggle" style="background:#f5f3ff;border-color:#ddd6fe;color:#5b21b6;" data-target="sec'+idxVg+'" onclick="toggleSeccion(\'sec'+idxVg+'\')">'+
        '<span>🔒 VIGILANCIA PRIVADA ('+vigilanciaData.registros.length+' registros)</span><span class="toggle-icon">▼</span></div>'+
        '<div id="sec'+idxVg+'" class="seccion-contenido collapsed"><div class="seccion-inner">'+renderVigilancia(vigilanciaData)+'</div></div>'+
        '</div></div>';

      seccionIdx++;
    });

    // Novedades al final
    if (novedades.length > 0) {
      html += '<div class="seccion-novedades"><div class="seccion-novedades-titulo">🚨 Novedades de Seguridad / Eventualidades ('+novedades.length+')</div>';
      novedades.forEach(n => {
        const tipo = n.Tipo?.Value||n.Tipo||'—';
        const concesion = n.Concesion?.Value||n.Concesion||'';
        const cargadoPor = n.CargadoPorNombre && n.CargadoPorNombre.length<40 ? n.CargadoPorNombre : (n.CargadoPorEmail||'');
        const ops = [n.Chofer1,n.Administrativo1,n.Administrativo2,n.Administrativo3].filter(Boolean);
        const operariosNov = ops.length>0 ? ops.map(o=>'<span style="background:#fee2e2;color:#991b1b;border-radius:12px;padding:2px 8px;font-size:11px;font-weight:600;margin:1px;display:inline-block;">👤 '+o+'</span>').join(' ') : '';
        html += '<div class="novedad-bloque"><div class="novedad-header"><div>'+
          '<div class="novedad-tipo">🚨 '+tipo+'</div>'+
          '<div style="font-size:11px;color:#6b7280;margin-top:3px;">'+(n.Fecha||'')+(concesion?' · '+concesion:'')+(cargadoPor?' · '+cargadoPor:'')+'</div>'+
          (operariosNov?'<div style="margin-top:4px;">'+operariosNov+'</div>':'')+
          '</div>'+
          (n.FotosCarpetaURL?'<a href="'+n.FotosCarpetaURL+'" target="_blank" style="font-size:11px;color:#dc2626;font-weight:600;white-space:nowrap;">📷 Ver fotos</a>':'')+
          '</div><div class="novedad-body">'+
          (n.Detalle?'<div style="margin-bottom:6px;">'+n.Detalle+'</div>':'')+
          (n.GPS_Latitud?'<div style="color:#94a3b8;font-size:11px;">📍 <a href="https://www.google.com/maps?q='+parseFloat(n.GPS_Latitud)+','+parseFloat(n.GPS_Longitud)+'" target="_blank" style="color:#3b82f6;text-decoration:none;">'+parseFloat(n.GPS_Latitud).toFixed(4)+', '+parseFloat(n.GPS_Longitud).toFixed(4)+'</a></div>':'')+
          '</div></div>';
      });
      html += '</div>';
    }

    contenido.innerHTML = html;
    document.getElementById('btnImprimir').style.display = 'inline-block';
  } catch(e) {
    contenido.innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div><div>Error al cargar el reporte: '+e.message+'</div></div>';
  }
}
</script>
